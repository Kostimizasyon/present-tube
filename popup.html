<!DOCTYPE html>
<html>

	<head>

		<style>

		:root {
		--bg: #050505;           /* Deep black */
		--card-bg: #111111;      /* Slightly lighter black */
		--accent: #00ff41;       /* Terminal green or #ffffff for pure monochrome */
		--text: #ffffff;
		--text-dim: #666666;
		--border: #222222;
		}

		body {
		width: 200px;
		background-color: var(--bg);
		color: var(--text);
		font-family: 'JetBrains Mono', 'Monaco', monospace; /* Monospace for that "hacker" feel */
		padding: 24px;
		margin: 0;
		}

		/* Centering the Header */
		header {
		text-align: center;
		margin-bottom: 24px;
		}

		h2 {
		font-size: 16px;
		margin: 0;
		font-weight: 800;
		letter-spacing: -1px;
		text-transform: uppercase;
		}

		.subtitle {
		font-size: 10px;
		color: var(--text-dim);
		text-transform: uppercase;
		letter-spacing: 2px;
		margin-top: 4px;
		display: block;
		}

		.warning-container {
		display: flex;
		justify-content: center; /* Centers horizontally */
		align-items: center;     /* Centers vertically */
		text-align: center;      /* Ensures text lines wrap nicely in the center */
		min-height: 100px;       /* Give it some height so vertical centering is visible */
		width: 100%;
		}

		.warning {
		color: red;
		letter-spacing: 2px;
		font-size: 20cap;
		margin-top: 4px;
		display: block;

		}

		#thumbnail-container {
		position: relative; 	
		}

		#vid-thumbnail {
		width: 100%;
		height: 100%;
		}

		#vid-duration {
		position: absolute;
		top: 0;
		left: 0;
		}
		</style>

	</head>

	<body>

		<header>
			<h2>I like privacy</h2>
			<h3 class="subtitle">Personal Recommendation Page</h3>
			<span> You dont gotta do nothin, just head on over to the 
				youtube homepage, and wait a lil for the extension
				to do its magic!
			</span>

			<a href="github.com" style="color: green; mt-4;"> <span> Source code </span> </a>


		</header>
	</body>

</html>
