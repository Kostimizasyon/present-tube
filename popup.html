<!DOCTYPE html>
<html>

	<head>

		<style>

		:root {
		      --bg: #050505;           /* Deep black */
		      --card-bg: #111111;      /* Slightly lighter black */
		      --accent: #00ff41;       /* Terminal green or #ffffff for pure monochrome */
		      --text: #ffffff;
		      --text-dim: #666666;
		      --border: #222222;
		    }

		    body {
		      width: 320px;
		      background-color: var(--bg);
		      color: var(--text);
		      font-family: 'JetBrains Mono', 'Monaco', monospace; /* Monospace for that "hacker" feel */
		      padding: 24px;
		      margin: 0;
		    }

		    /* Centering the Header */
		    header {
		      text-align: center;
		      margin-bottom: 24px;
		    }

		    h2 {
		      font-size: 16px;
		      margin: 0;
		      font-weight: 800;
		      letter-spacing: -1px;
		      text-transform: uppercase;
		    }

		    .subtitle {
		      font-size: 10px;
		      color: var(--text-dim);
		      text-transform: uppercase;
		      letter-spacing: 2px;
		      margin-top: 4px;
		      display: block;
		    }

		#thumbnail-container {
			position: relative; 	
		}

		#vid-thumbnail {
			width: 100%;
			height: 100%;
		}

		#vid-duration {
			position: absolute;
			top: 0;
			left: 0;
		}

		:root {
			
		}


		</style>

	</head>

	<body>
	
	<header>
		<h2>FUCK YOUTUBE</h2>
		<span class="subtitle">Personal Recommendation Page</span>
	</header>

		<script src="popup.js"></script>
	</body>

</html>
